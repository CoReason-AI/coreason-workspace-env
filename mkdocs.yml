site_name: CoReason Workspace Environment
site_description: Documentation for the CoReason headless agent development platform
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Introduction:
    - Home: index.md
    - Getting Started: getting_started.md
    - User Guide: user_guide.md
    - Mangalore News Vignette: vignette_mangalore_news.md
  - Architecture & System Design:
    - Core Architecture: core_architecture.md
    - MECE System Capabilities: system_capabilities_mece.md
    - Bare-Metal Services: services.md
  - Capabilities & Parity:
    - General-Purpose Agent Parity: general_purpose_agent_parity.md
    - Interaction Surfaces: interaction_surfaces.md
  - Developer & How-To Guides:
    - Developer Guide: developer_guide.md
    - How-To Recipes: how_to_guides.md
    - End-to-End Tutorials: tutorials.md
  - Deployment & Enterprise Shell:
    - Deployment Guide: deployment_guide.md
    - Dify Deployment: dify_deployment.md
    - Real-World Use Cases: real_world_use_cases.md
  - Testing & Quality Assurance:
    - Testing Architecture: testing_and_verification.md
