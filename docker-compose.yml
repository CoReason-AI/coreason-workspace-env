version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: knowledge_db
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
