services:
  # 1. Main FastAPI Platform Server (DeepAgent Worker Nodes)
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://dify-redis:6379/1
      - CELERY_RESULT_BACKEND=redis://dify-redis:6379/1
    volumes:
      - ./src:/home/coreason/project/src
    restart: always

  # 1.1 CoReason Celery Worker
  platform_worker:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    command: ["python", "-m", "celery", "-A", "src.core.celery_app", "worker", "-l", "INFO"]
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis_queue:6379/1
      - CELERY_RESULT_BACKEND=redis://redis_queue:6379/1
      - POSTGRES_HOST=postgres_checkpointer
      - POSTGRES_PORT=5432
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      - dify-redis
    restart: always

  # 1.5 MCP Server for Dify routing over SSE
  mcp_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    command: ["fastmcp", "run", "src/mcp/server.py", "--transport", "sse"]
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./src:/home/coreason/project/src
    restart: always

  # 2. Dify API Server
  dify-api:
    image: langgenius/dify-api:latest
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=dify-redis
      - DB_HOST=dify-postgres
      - DB_PASSWORD=dify
      - DB_USERNAME=postgres
      - DB_DATABASE=dify
      - CONSOLE_CORS_ALLOW_ORIGINS=*
      - WEB_API_CORS_ALLOW_ORIGINS=*
    depends_on:
      - dify-postgres
      - dify-redis
    restart: always

  # 3. Dify Worker
  dify-worker:
    image: langgenius/dify-api:latest
    command: celery -A app.celery worker -l INFO
    environment:
      - REDIS_HOST=dify-redis
      - DB_HOST=dify-postgres
      - DB_PASSWORD=dify
      - DB_USERNAME=postgres
      - DB_DATABASE=dify
    depends_on:
      - dify-postgres
      - dify-redis
    restart: always

  # 0. Enterprise Gateway (Nginx Reverse Proxy - Port 80 HTTP / Port 443 HTTPS TLS)
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - dify-web
      - dify-api
      - platform_server
      - mcp_server
    restart: always

  # 4. Dify Web UI
  dify-web:
    image: langgenius/dify-web:latest
    ports:
      - "3000:3000"
    environment:
      - CONSOLE_API_URL=http://dify-api:5001
      - APP_API_URL=http://dify-api:5001
      - NEXT_PUBLIC_CONSOLE_API_URL=http://localhost:5001
      - NEXT_PUBLIC_APP_API_URL=http://localhost:5001
    depends_on:
      - dify-api
    restart: always

  # 5. Dify Redis
  dify-redis:
    image: redis:6-alpine
    restart: always

  # 6. Dify Postgres
  dify-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=dify
      - POSTGRES_DB=dify
      - POSTGRES_USER=postgres
    volumes:
      - dify-pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  dify-pgdata:
