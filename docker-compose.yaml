version: '3.8'

services:
  # 1. Main FastAPI Platform Server
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      redis_queue:
        condition: service_started
      postgres_checkpointer:
        condition: service_healthy
    restart: always

  # 2. Background Task Worker (Pulls and runs enqueued agent tasks)
  platform_worker:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    env_file:
      - .env
    command: ["/home/coreason/project/.venv/bin/python", "-m", "src.workers.keda_worker"]
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      redis_queue:
        condition: service_started
      postgres_checkpointer:
        condition: service_healthy
    restart: always

  # 3. LangGraph PostgreSQL Checkpointer Database
  postgres_checkpointer:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: coreason_admin
      POSTGRES_PASSWORD: secure_dev_password
      POSTGRES_DB: langgraph_state
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreason_admin -d langgraph_state"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 4. Redis for task queue
  redis_queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  # 5. HashiCorp Vault (Dev Server for local secrets federation)
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    restart: always

  # 6. Langfuse — Self-Hosted LLM Observability & Tracing
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://coreason_admin:secure_dev_password@postgres_checkpointer:5432/langgraph_state"
      NEXTAUTH_URL: "http://localhost:3001"
      NEXTAUTH_SECRET: "coreason-langfuse-dev-secret"
      SALT: "coreason-langfuse-dev-salt"
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # 7. Watchtower — Auto-update containers on new registry releases
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 600
    restart: always


volumes:
  pgdata:
