services:
  # 1. Main FastAPI Platform Server
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_checkpointer
      POSTGRES_PORT: 5432
      DIFY_API_KEY: "coreason-local-dify-secret"
      DIFY_BASE_URL: "http://dify-api:5001/v1"
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
    restart: always

  # 3. LangGraph PostgreSQL Checkpointer Database
  postgres_checkpointer:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coreason_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_state}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreason_admin -d langgraph_state"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Vault is deprecated in favor of Dify.

  # 6. Dify - Sovereign RAG and LLM App Orchestration
  dify-api:
    image: langgenius/dify-api:latest
    ports:
      - "5001:5001"
    environment:
      # Static API key for internal CoReason binding
      INIT_ADMIN_API_KEY: "coreason-local-dify-secret"
    restart: always

  # 7. Jaeger — OpenTelemetry OTLP Trace Collector
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4318:4318"   # OTLP HTTP
    restart: always

  # 8. Watchtower — Auto-update containers on new registry releases
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 600
    restart: always
volumes:
  pgdata:
