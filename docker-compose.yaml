version: '3.8'

services:
  # 1. Main FastAPI Platform Server
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_checkpointer
      POSTGRES_PORT: 5432
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
    restart: always

  # 3. LangGraph PostgreSQL Checkpointer Database
  postgres_checkpointer:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coreason_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_state}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreason_admin -d langgraph_state"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 5. HashiCorp Vault (Dev Server for local secrets federation)
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID:-root}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    restart: always

  # 6. Jaeger — OpenTelemetry OTLP Trace Collector
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4318:4318"   # OTLP HTTP
    restart: always

  # 8. Watchtower — Auto-update containers on new registry releases
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 600
    restart: always
volumes:
  pgdata:
