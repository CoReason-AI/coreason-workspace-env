services:
  # 1. Main FastAPI Platform Server (DeepAgent Worker Nodes)
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    volumes:
      - ./src:/home/coreason/project/src
    restart: always

  # 2. Dify API Server
  dify-api:
    image: langgenius/dify-api:latest
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=dify-redis
      - DB_HOST=dify-postgres
      - DB_PASSWORD=dify
      - DB_USERNAME=postgres
      - DB_DATABASE=dify
    depends_on:
      - dify-postgres
      - dify-redis
    restart: always

  # 3. Dify Worker
  dify-worker:
    image: langgenius/dify-api:latest
    command: celery -A app.celery worker -l INFO
    environment:
      - REDIS_HOST=dify-redis
      - DB_HOST=dify-postgres
      - DB_PASSWORD=dify
      - DB_USERNAME=postgres
      - DB_DATABASE=dify
    depends_on:
      - dify-postgres
      - dify-redis
    restart: always

  # 4. Dify Web UI
  dify-web:
    image: langgenius/dify-web:latest
    ports:
      - "3000:3000"
    environment:
      - CONSOLE_API_URL=http://dify-api:5001
      - APP_API_URL=http://dify-api:5001
    depends_on:
      - dify-api
    restart: always

  # 5. Dify Redis
  dify-redis:
    image: redis:6-alpine
    restart: always

  # 6. Dify Postgres
  dify-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=dify
      - POSTGRES_DB=dify
      - POSTGRES_USER=postgres
    volumes:
      - dify-pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  dify-pgdata:
