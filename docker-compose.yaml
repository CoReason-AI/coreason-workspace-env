version: '3.8'

services:
  # 1. Main FastAPI Platform Server
  platform_server:
    image: ghcr.io/coreason-ai/coreason-workspace-env:develop
    ports:
      - "9005:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_checkpointer
      POSTGRES_PORT: 5432
      VAULT_ADDR: http://vault:8200
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./src:/home/coreason/project/src
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
    restart: always

  # 3. LangGraph PostgreSQL Checkpointer Database
  postgres_checkpointer:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coreason_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_state}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreason_admin -d langgraph_state"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 5. HashiCorp Vault (Dev Server for local secrets federation)
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID:-root}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    restart: always

  # 6. ClickHouse — Highly performant OLAP DB for Langfuse v3
  clickhouse:
    image: clickhouse/clickhouse-server:23.12-alpine
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: always

  # 7. Langfuse — Self-Hosted LLM Observability & Tracing
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-coreason_admin}:${POSTGRES_PASSWORD:-secure_dev_password}@postgres_checkpointer:5432/langfuse"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-1234567890}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-1234567890}
      NEXTAUTH_URL: "http://localhost:3002"
      NEXTAUTH_SECRET: "coreason-langfuse-dev-secret"
      SALT: "coreason-langfuse-dev-salt"
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse:9000"
      CLICKHOUSE_USER: "langfuse"
      CLICKHOUSE_PASSWORD: "langfuse"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
      clickhouse:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # 8. Watchtower — Auto-update containers on new registry releases
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 600
    restart: always
volumes:
  pgdata:
  clickhouse_data:
