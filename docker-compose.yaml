version: '3.8'

services:
  # LangGraph PostgreSQL Checkpointer Database
  postgres_checkpointer:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: coreason_admin
      POSTGRES_PASSWORD: secure_dev_password
      POSTGRES_DB: langgraph_state
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreason_admin -d langgraph_state"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery/KEDA Async Task Queue (Optional but recommended for scaling)
  redis_queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # HashiCorp Vault (Dev Server for local secrets federation)
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  # Langfuse — Self-Hosted LLM Observability & Tracing
  # Provides visual debugging dashboards for System-2 reasoning traces.
  # Bridges to the WORM auditor via shared run_id and cryptographic hash.
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://coreason_admin:secure_dev_password@postgres_checkpointer:5432/langgraph_state"
      NEXTAUTH_URL: "http://localhost:3001"
      NEXTAUTH_SECRET: "coreason-langfuse-dev-secret"
      SALT: "coreason-langfuse-dev-salt"
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres_checkpointer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
