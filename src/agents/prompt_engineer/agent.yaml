name: "prompt_engineer"
type: "sub-agent"
description: "Deterministic worker that writes zero-shot and few-shot system prompts
  for agent YAMLs based on behavioral requirements."
skill_registry:
  - name: "agent_building_standards"
    artifact_types: ["agent_yaml"]
    abstract: "How to construct DeepAgent YAML manifests — Context Engineering Harness,
      naming, skills, system_prompt structure"
    path: "core/skills/building/agent_building_standards"
  - name: "skill_building_standards"
    artifact_types: ["skill"]
    abstract: "How to construct agentic skills/SOPs — single responsibility, input/output
      schemas, refusal predicates"
    path: "core/skills/building/skill_building_standards"
  - name: "legacy_modernization_standards"
    artifact_types: ["legacy_ir"]
    abstract: "How to deconstruct legacy agentic patterns into normalized IR — spaghetti
      prompts, free-text handoffs, direct egress, linear pipelines"
    path: "core/skills/building/legacy_modernization_standards"
  - name: "role_based_crew_collaboration"
    artifact_types: ["agent_yaml"]
    abstract: "Building flat, peer-to-peer agent networks based on the CrewAI topology."
    path: "core/skills/building/role_based_crew_collaboration"
  - name: "metagpt_sop_simulation"
    artifact_types: ["agent_yaml"]
    abstract: "Building strict sequential corporate pipelines mirroring MetaGPT/ChatDev."
    path: "core/skills/building/metagpt_sop_simulation"
  - name: "autogen_conversational_routing"
    artifact_types: ["agent_yaml"]
    abstract: "Designing dynamic A2A conversational graphs and ChatManagers via AutoGen patterns."
    path: "core/skills/building/autogen_conversational_routing"
  - name: "constraint_saturation_limits"
    artifact_types: ["agent_yaml"]
    abstract: "Preventing 'Over-steering' and the breakdown of LLM attention mechanisms."
    path: "core/skills/building/constraint_saturation_limits"
  - name: "cognitive_skill_taxonomy"
    artifact_types: ["agent_yaml"]
    abstract: "Standardizing how the factory categorizes agent skills (persona, tool, workflow)."
    path: "core/skills/building/cognitive_skill_taxonomy"
  - name: "prompt_compression_techniques"
    artifact_types: ["agent_yaml"]
    abstract: "Optimizing token efficiency for agent-to-agent communication via Caveman Prompting."
    path: "core/skills/building/prompt_compression_techniques"
  - name: "structured_meta_prompting"
    artifact_types: ["agent_yaml"]
    abstract: "Framework for writing rigorous, code-like system prompts using pseudo-code tags."
    path: "core/skills/building/structured_meta_prompting"
  - name: "file_editing_strategies"
    artifact_types: ["agent_yaml"]
    abstract: "Instructing code-generating agents on how to modify files based on scale (diffs vs overwrites)."
    path: "core/skills/building/file_editing_strategies"
  - name: "twelve_factor_agents"
    artifact_types: ["agent_yaml"]
    abstract: "Building production-grade, scalable agents using 12-Factor methodologies."
    path: "core/skills/building/twelve_factor_agents"
  - name: "modular_agent_identity"
    artifact_types: ["agent_yaml"]
    abstract: "Preventing system prompt bloat by modularizing personality and rules (e.g. SOUL.md)."
    path: "core/skills/building/modular_agent_identity"
  - name: "prompt_complexity_bounds"
    artifact_types: ["agent_yaml"]
    abstract: "Identifying when a prompt is too complex and must be transitioned to an agentic workflow."
    path: "core/skills/building/prompt_complexity_bounds"
  - name: "task_decomposition_patterns"
    artifact_types: ["agent_yaml"]
    abstract: "Safely decomposing complex workflows without falling into the overengineering trap."
    path: "core/skills/building/task_decomposition_patterns"
  - name: "ambiguity_resolution"
    artifact_types: ["agent_yaml"]
    abstract: "How orchestrators handle underspecified intent via state machine interrogation."
    path: "core/skills/building/ambiguity_resolution"
  - name: "analogical_mapping"
    artifact_types: ["agent_yaml"]
    abstract: "Structural templates and schemas for Analogical Prompting and Transfer."
    path: "core/skills/building/reasoning/analogical_mapping"
  - name: "dialectical_synthesis"
    artifact_types: ["agent_yaml"]
    abstract: "State geometry for Thesis -> Antithesis -> Synthesis critique loops."
    path: "core/skills/building/reasoning/dialectical_synthesis"
  - name: "epidemiological_causal_inference"
    artifact_types: ["agent_yaml"]
    abstract: "Evaluation of causal hypotheses using Bradford Hill Criteria."
    path: "core/skills/building/reasoning/epidemiological_causal_inference"
  - name: "counterfactual_simulation"
    artifact_types: ["agent_yaml"]
    abstract: "Simulating do-interventions via causal engines like dowhy."
    path: "core/skills/building/reasoning/counterfactual_simulation"
  - name: "glass_box_traceability"
    artifact_types: ["agent_yaml"]
    abstract: "Explicit assumption boundaries for FDA/GxP compliance."
    path: "core/skills/building/reasoning/glass_box_traceability"
  - name: "bayesian_orchestration"
    artifact_types: ["agent_yaml"]
    abstract: "Tracking prior and posterior beliefs for uncertain routing."
    path: "core/skills/building/reasoning/bayesian_orchestration"
  - name: "abductive_root_cause"
    artifact_types: ["agent_yaml"]
    abstract: "Finding the most plausible cause from observed symptoms."
    path: "core/skills/building/reasoning/abductive_root_cause"
system_prompt: |
  You are a highly constrained, deterministic Prompt Writer.
  You accept persona constraints from the agent_pm and output perfectly formatted, highly constrained system prompts.
  You DO NOT ask clarifying questions.

  Every system prompt you write must enforce the Context Engineering Harness pattern from the Agent Building Standards. Orchestrator prompts must include evaluate/interrogate/delegate behavior. Sub-agent prompts must include "DO NOT interrogate the user" and deterministic execution constraints. If the incoming specification does not clearly define the agent's type, fail with an error — do not guess.

  When writing prompts for skill-producing agents, follow the Skill Building Standards — single responsibility, strict input/output schemas, refusal predicates, and negative constraints must be embedded in the prompt.
  When receiving a LegacyIR payload, focus on the `agents[].raw_prompt` fields. Decompose spaghetti prompts into role-constrained system prompts per the Legacy Modernization Standards.

  The relevant building standard for your current task will be JIT-loaded into your context based on the artifact type.

  Your output will be validated by the agent_validator before being written to disk. Focus on building correctly.
dependencies: []
executor:
  harness: deepagents
  model: auto
async: true
cancellable: true
os_env:
  type: caller_process
