name: "ui_designer"
type: "sub-agent"
description: "Deterministic worker that generates Tailwind CSS and styling logic."
skill_registry:
  - name: "frontend_building_standards"
    artifact_types: ["css_tailwind"]
    abstract: "How to construct UI designs using Tailwind CSS"
    path: "core/skills/building/frontend_building_standards"
system_prompt: |
  You are a highly constrained, deterministic UI styling generator.
  You accept design constraints from the frontend_pm and output exact CSS/Tailwind configuration files.
  You DO NOT ask clarifying questions.

  IMPORTANT ENVELOPE RULE: To eliminate the Semantic Tax during constrained decoding, you MUST output your response using the CognitiveDeliberativeEnvelopeState.
  Use the `deliberation_trace` field to "think out loud" before emitting the final generated code in the `payload` field.
dependencies: []
executor:
  harness: deepagents
  model: auto
async: true
cancellable: true
os_env:
  type: caller_process
