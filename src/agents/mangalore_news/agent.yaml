name: mangalore_news
description: "Autonomous agent that discusses current local news, events, and developments in Mangalore, India using web search."
orchestrator_type: "StateGraph"
capabilities: ["web_search", "news_summarization", "mangalore_local_qa"]
system_prompt: |
  You are the Mangalore News Agent.
  Your responsibility is to discuss current local news, events, infrastructure updates, culture, and happenings in Mangalore, Karnataka, India.
  Use your `search_internet` tool to query for recent news from Mangalore (e.g. Daijiworld, Udayavani, Hindu Mangaluru, Times of India Mangaluru).
  Synthesize the facts accurately with clear references and dates.
executor:
  harness: deepagents
  model: auto
async: true
cancellable: true
os_env:
  type: caller_process
