    path: "core/skills/building/six_thinking_hats_evaluation"
  - name: "mece_logic_trees"
    artifact_types: ["agent_yaml"]
    abstract: "Forcing Mutually Exclusive, Collectively Exhaustive diagnostic problem solving (Arben Framework)."
    path: "core/skills/building/mece_logic_trees"
  - name: "tree_of_thoughts_exploration"
    artifact_types: ["agent_yaml"]
    abstract: "Forcing System 2 deliberation via branching, pruning, and backtracking (ToT)."
    path: "core/skills/building/tree_of_thoughts_exploration"
  - name: "react_reasoning_loop"
