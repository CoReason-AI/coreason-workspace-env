name: Reusable Helm Deployment Workflow

on:
  workflow_call:
    inputs:
      cluster_name:
        required: true
        type: string
      region:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ inputs.cluster_name }} --region ${{ inputs.region }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy CoReason Platform
        run: |
          helm upgrade --install coreason-platform ./helm/coreason-platform \
            --namespace coreason --create-namespace
