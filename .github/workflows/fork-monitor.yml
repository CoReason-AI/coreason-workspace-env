name: Fork Monitor (Supply-Chain Provenance Sentinel)

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: read-all

jobs:
  monitor-forks:
    name: Fork Provenance Monitor
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Fetch Fork Topology
        id: forks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="CoReason-AI/coreason-manifest"

          # Fetch all forks with pagination
          PAGE=1
          ALL_FORKS="[]"
          while true; do
            RESPONSE=$(curl -s \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${REPO}/forks?per_page=100&page=${PAGE}")

            COUNT=$(echo "$RESPONSE" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            ALL_FORKS=$(echo "$ALL_FORKS $RESPONSE" | jq -s 'add')
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(echo "$ALL_FORKS" | jq 'length')
          echo "total_forks=$TOTAL" >> "$GITHUB_OUTPUT"

          # Detect forks created in the last 25 hours (overlap window for daily cron)
          CUTOFF=$(date -u -d '25 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NEW_FORKS=$(echo "$ALL_FORKS" | jq --arg cutoff "$CUTOFF" \
            '[.[] | select(.created_at > $cutoff)]')
          NEW_COUNT=$(echo "$NEW_FORKS" | jq 'length')
          echo "new_forks=$NEW_COUNT" >> "$GITHUB_OUTPUT"

          # Build a summary table for new forks
          if [ "$NEW_COUNT" -gt 0 ]; then
            SUMMARY=$(echo "$NEW_FORKS" | jq -r \
              '.[] | "| [\(.owner.login)](https://github.com/\(.owner.login)) | [\(.full_name)](https://github.com/\(.full_name)) | \(.created_at) | \(.owner.type) |"')
            echo "has_new=true" >> "$GITHUB_OUTPUT"

            # Write multi-line summary to file for the next step
            {
              echo "| Owner | Fork | Created At | Type |"
              echo "|-------|------|------------|------|"
              echo "$SUMMARY"
            } > /tmp/fork_summary.md
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

          echo "::notice::Total forks: $TOTAL | New forks (last 25h): $NEW_COUNT"

      - name: Create Issue for New Forks
        if: steps.forks.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORK_TABLE=$(cat /tmp/fork_summary.md)
          DATE=$(date -u '+%Y-%m-%d')

          gh issue create \
            --repo "CoReason-AI/coreason-manifest" \
            --title "🔱 Fork Provenance Alert — ${DATE}" \
            --label "supply-chain" \
            --body "## New Fork(s) Detected

          **${{ steps.forks.outputs.new_forks }}** new fork(s) detected in the last 24 hours.
          **Total forks:** ${{ steps.forks.outputs.total_forks }}

          ### Fork Manifest

          ${FORK_TABLE}

          ---
          > ⚠️ **Reminder:** The underlying schema is governed by the [Prosperity Public License 3.0](https://prosperitylicense.com/versions/3.0.0) and belongs to CoReason Inc. Commercial use beyond a 30-day trial requires a separate license. Contact license@coreason.ai for inquiries.

          ---
          *Generated by the Fork Provenance Sentinel workflow.*"


