services:
  # Overrides for the main platform server to build locally and use sovereign endpoints
  platform_server:
    build: .
    environment:
      WORM_S3_ENDPOINT: "http://minio:9000"
      LLM_BASE_URL: "http://ollama:11434/v1"
      LLM_MODEL_NAME: "llama3"
    depends_on:
      - minio
      - ollama

  # Sovereign WORM Storage (S3 API)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  # Sovereign LLM Engine (with NVIDIA GPU Support)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

volumes:
  minio_data:
  ollama_data:
