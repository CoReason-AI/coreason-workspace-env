services:
  # Overrides for the main platform server to build locally and respect .env MaaS endpoints
  platform_server:
    build: .
    volumes:
      - ./src:/home/coreason/project/src
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-llama3}


  # Sovereign LLM Engine (with NVIDIA GPU Support)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

volumes:
  ollama_data:
