apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "coreason-platform.fullname" . }}-worker
  labels:
    {{- include "coreason-platform.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "coreason-platform.fullname" . }}-worker
  minReplicaCount: 1
  maxReplicaCount: 100
  triggers:
    - type: redis
      metadata:
        address: {{ .Release.Name }}-redis-master:6379
        listName: langgraph_execution_queue
        listLength: "5"
