apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coreason-platform.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
spec:
  replicas: 1 # Managed by KEDA
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/home/coreason/project/.venv/bin/python", "-m", "src.workers.keda_worker"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: POSTGRES_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: REDIS_QUEUE_NAME
              value: "tasks"
