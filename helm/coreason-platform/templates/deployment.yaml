apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coreason-platform.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
    spec:
      hostAliases:
        - ip: "172.17.0.1"
          hostnames:
            - "host.docker.internal"
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: workspace-config
            - secretRef:
                name: workspace-secrets
