apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coreason-platform.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "coreason-platform.name" . }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # Vault Federation & Config Maps go here
            - name: ENVIRONMENT
              value: "production"
