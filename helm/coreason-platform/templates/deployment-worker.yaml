apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coreason-platform.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "coreason-platform.name" . }}-worker
    spec:
      hostAliases:
        - ip: "172.17.0.1"
          hostnames:
            - "host.docker.internal"
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/home/coreason/project/.venv/bin/python", "-m", "src.workers.keda_worker"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: workspace-config
            - secretRef:
                name: workspace-secrets
