replicaCount: 1

image:
  repository: ghcr.io/coreason-ai/coreason-workspace-env
  pullPolicy: IfNotPresent
  tag: "develop"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# CISO Requirements
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Web Server & Resiliency settings
web:
  workers: 2

gracefulShutdownTimeout: 30

# In-process monolithic architecture defaults (workers disabled)
worker:
  enabled: false

# Autoscaling Configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationWindow: 300

# Sub-charts for Infinite Scalability (Disabled in monolithic setup)
redis:
  enabled: false
  architecture: replication
  auth:
    enabled: true

postgresql:
  enabled: false
  auth:
    database: coreason_db
    username: coreason_admin

keda:
  enabled: false

kserve:
  enabled: false
