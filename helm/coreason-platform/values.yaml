replicaCount: 1

image:
  repository: coreason/platform
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# CISO Requirements
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Sub-charts for Infinite Scalability
redis:
  enabled: false
  architecture: replication
  auth:
    enabled: true

postgresql:
  enabled: false
  auth:
    database: coreason_db
    username: coreason_admin

keda:
  enabled: false

kserve:
  enabled: false
