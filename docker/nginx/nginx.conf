events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream backend services
    upstream dify_web_backend {
        server dify-web:3000;
    }

    upstream dify_api_backend {
        server dify-api:5001;
    }

    upstream platform_server_backend {
        server platform_server:8000;
    }

    upstream mcp_server_backend {
        server mcp_server:8000;
    }

    # HTTP Gateway (Port 80)
    server {
        listen 80;
        server_name localhost dify-api 127.0.0.1;

        # WebSocket & SSE headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Dify Console API
        location /console/api/ {
            proxy_pass http://dify_api_backend;
        }

        # Dify Web API
        location /v1/ {
            proxy_pass http://dify_api_backend;
        }

        # CoReason Platform Server API
        location /platform/ {
            proxy_pass http://platform_server_backend/;
        }

        # CoReason MCP Server
        location /mcp/ {
            proxy_pass http://mcp_server_backend/;
        }

        # Dify Web UI Dashboard
        location / {
            proxy_pass http://dify_web_backend;
        }
    }

    # HTTPS Gateway (Port 443 with TLS)
    server {
        listen 443 ssl;
        server_name localhost dify-api 127.0.0.1;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # WebSocket & SSE headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Dify Console API
        location /console/api/ {
            proxy_pass http://dify_api_backend;
        }

        # Dify Web API
        location /v1/ {
            proxy_pass http://dify_api_backend;
        }

        # CoReason Platform Server API
        location /platform/ {
            proxy_pass http://platform_server_backend/;
        }

        # CoReason MCP Server
        location /mcp/ {
            proxy_pass http://mcp_server_backend/;
        }

        # Dify Web UI Dashboard
        location / {
            proxy_pass http://dify_web_backend;
        }
    }
}
