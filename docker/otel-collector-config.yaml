receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s

exporters:
  otlphttp/langfuse:
    endpoint: "${LANGFUSE_OTEL_ENDPOINT}" # e.g., http://langfuse:3000/api/public/otel
    headers:
      Authorization: "Basic ${LANGFUSE_AUTH_BASE64}" # base64(public_key:secret_key)
  
  # Optional: Log to console for debugging
  logging:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/langfuse, logging]
